<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Pop Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #gameCanvas {
            display: block;
            cursor: crosshair;
        }
        #score {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px black;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game variables
        let score = 0;
        let balloons = [];
        let popSound = new Audio('pope.mp3');
        let gameOver = false;
        let difficultyLevel = 1;
        let baseSpeed = 1;
        let spawnRate = 1000; // milliseconds between spawns
        let spawnInterval = null;

        // Load images
        const balloonImg = new Image();
        balloonImg.src = 'redBaloon.png';

        const blackBalloonImg = new Image();
        blackBalloonImg.src = 'redBaloon.png';
        blackBalloonImg.crossOrigin = 'anonymous';
        
        // Create black balloon canvas
        const blackCanvas = document.createElement('canvas');
        blackCanvas.width = 100;
        blackCanvas.height = 140;
        const blackCtx = blackCanvas.getContext('2d');
        
        // Draw black balloon when image loads
        balloonImg.onload = function() {
            // Create black version
            blackCtx.drawImage(balloonImg, 0, 0, 100, 140);
            const imgData = blackCtx.getImageData(0, 0, 100, 140);
            for (let i = 0; i < imgData.data.length; i += 4) {
                imgData.data[i] = 30;     // R
                imgData.data[i+1] = 30;   // G
                imgData.data[i+2] = 30;   // B
            }
            blackCtx.putImageData(imgData, 0, 0);
        };

        const skyImg = new Image();
        skyImg.src = 'sky.png';

        // Balloon class
        class Balloon {
            constructor(isBlack = false) {
                this.x = Math.random() * (canvas.width - 80) + 40;
                this.y = -100;
                this.speed = (Math.random() * 2 + 1) * baseSpeed;
                this.size = 60 + Math.random() * 20;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.02;
                this.isBlack = isBlack;
                this.hitsNeeded = isBlack ? 3 : 1;
                this.hitsRemaining = this.hitsNeeded;
            }

            update() {
                this.y += this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.isBlack) {
                    ctx.drawImage(blackCanvas, -this.size/2, -this.size/2, this.size, this.size * 1.4);
                } else {
                    ctx.drawImage(balloonImg, -this.size/2, -this.size/2, this.size, this.size);
                }
                
                // Show hits remaining for black balloons
                if (this.isBlack && this.hitsRemaining > 1) {
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold ' + (this.size/3) + 'px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.hitsRemaining, 0, 0);
                }
                ctx.restore();
            }

            contains(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return Math.sqrt(dx*dx + dy*dy) < this.size / 2;
            }
        }

        // Draw background
        function drawBackground() {
            if (skyImg.complete) {
                ctx.drawImage(skyImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        // Spawn balloons
        function spawnBalloon() {
            if (balloons.length < 10) {
                // Black balloons appear more often at higher difficulty
                const isBlack = Math.random() < (0.1 + difficultyLevel * 0.05);
                balloons.push(new Balloon(isBlack));
            }
        }

        // Update spawn rate
        function updateSpawnRate() {
            if (spawnInterval) {
                clearInterval(spawnInterval);
            }
            spawnInterval = setInterval(spawnBalloon, spawnRate);
        }

        // Pop balloon
        function popBalloon(x, y) {
            if (gameOver) return false;
            
            for (let i = balloons.length - 1; i >= 0; i--) {
                if (balloons[i].contains(x, y)) {
                    popSound.currentTime = 0;
                    popSound.play().catch(() => {});
                    
                    balloons[i].hitsRemaining--;
                    
                    if (balloons[i].hitsRemaining <= 0) {
                        balloons.splice(i, 1);
                        score += 10;
                        scoreElement.textContent = 'Score: ' + score;
                    }
                    
                    // Increase difficulty every 100 points
                    if (Math.floor(score / 100) > difficultyLevel - 1) {
                        difficultyLevel = Math.floor(score / 100) + 1;
                        baseSpeed = 1 + (difficultyLevel - 1) * 0.3;
                        spawnRate = Math.max(300, 1000 - (difficultyLevel - 1) * 100);
                        updateSpawnRate();
                    }
                    return true;
                }
            }
            return false;
        }

        // Game loop
        function gameLoop() {
            if (gameOver) return;
            
            drawBackground();

            // Update and draw balloons
            for (let i = balloons.length - 1; i >= 0; i--) {
                balloons[i].update();
                balloons[i].draw();

                // Remove balloons that go off screen and deduct points
                if (balloons[i].y > canvas.height + 100) {
                    balloons.splice(i, 1);
                    if (!gameOver) {
                        score -= 30;
                        scoreElement.textContent = 'Score: ' + score;
                        
                        // Check for game over
                        if (score < 0) {
                            gameOver = true;
                            showGameOver();
                        }
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Show game over message
        function showGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff3333';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('נפסל!', canvas.width/2, canvas.height/2);
            
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.fillText('הקש לחיצה למשחק חדש', canvas.width/2, canvas.height/2 + 50);
        }

        // Restart game on click when game over
        canvas.addEventListener('click', (e) => {
            if (gameOver) {
                score = 0;
                difficultyLevel = 1;
                baseSpeed = 1;
                spawnRate = 1000;
                balloons = [];
                gameOver = false;
                scoreElement.textContent = 'Score: 0';
                updateSpawnRate();
                gameLoop();
            } else {
                popBalloon(e.clientX, e.clientY);
            }
        });

        // Touch handler for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            popBalloon(touch.clientX, touch.clientY);
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Start game
        updateSpawnRate();
        gameLoop();
    </script>
</body>
</html>
